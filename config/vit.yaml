# ===== ViT (global attention, patch_size=2) =====
# base.yaml 대비 다른 값만 기재
model: vit
output_path: ./output/vit/

patch_size: 2
embed_dim: 256
depth: 8
attn_head_dim: 32
drop_rate: 0.1
use_layer_scale: true
train_batch_size: 128
learning_rate: 5e-4
weight_decay: 0.02
warmup_epochs: 20
max_grad_norm: 1.0
augment: weak
